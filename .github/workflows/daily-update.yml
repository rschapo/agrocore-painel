name: Atualizacao diaria e deploy

# Roda dias uteis com ATE 3 TENTATIVAS de disparo automatico -- 05:42, 07:38 e 08:47 BRT
# (08:42, 10:38 e 11:47 UTC): atualiza o painel com o Claude Code, faz commit e publica no
# Netlify. Requer o secret ANTHROPIC_API_KEY.
# OBS (avancado): a etapa de atualizacao usa o Claude Code em modo nao interativo e depende
# de acesso a web/fontes. Se falhar, o deploy do index.html atual ainda ocorre.
# O `schedule` do GitHub Actions e "best effort" (nao garantido) -- a documentacao oficial
# avisa que execucoes podem atrasar ou nao disparar em horarios de pico (o topo da hora,
# :00, e o mais concorrido -- por isso nenhum dos 3 horarios cai em :00). Ja tivemos DOIS
# dias (10/07 e 13/07) em que o schedule simplesmente nao disparou nem uma vez, entao 3
# tentativas por dia (a pedido do usuario) reduzem bastante a chance de um dia inteiro
# sem atualizacao automatica. Um guard (job "Verificar se ja rodou hoje") pula as tentativas
# seguintes assim que uma ja tiver rodado com sucesso, para nao processar/gastar credito em
# dobro/triplo num dia em que mais de uma dispararem.
on:
  schedule:
    - cron: '42 8 * * 1-5'
    - cron: '38 10 * * 1-5'
    - cron: '47 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar se ja rodou hoje (evita duplicar no cron de reserva)
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_BOT_DATE="$(git log -1 --author=agrocore-bot --format=%cd --date=format:%Y-%m-%d -- index.html 2>/dev/null || true)"
          TODAY="$(date -u +%F)"
          if [ "$LAST_BOT_DATE" = "$TODAY" ]; then
            echo "Ja existe commit do agrocore-bot hoje ($TODAY) -- pulando esta execucao (provavelmente o cron principal ja rodou e este e o de reserva)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: '20'
      - name: Instalar ferramentas
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code netlify-cli
      - name: Atualizar painel com o Claude
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # --allowedTools libera WebSearch/WebFetch (o acceptEdits so cobre Edit/Write).
        # De proposito NAO liberamos Bash aqui: o passo seguinte ja faz o deploy,
        # entao o Claude nao precisa rodar ./deploy.sh nem shell arbitrario nesta etapa.
        run: |
          PROMPT="$(cat rotina-diaria.md)

          Nesta execucao automatizada (CI), NAO rode ./deploy.sh nem nenhum comando de shell -- apenas pesquise e edite o index.html. A publicacao e feita por um passo separado do workflow."
          claude -p "$PROMPT" --permission-mode acceptEdits --allowedTools "WebSearch,WebFetch" 2>&1 | tee /tmp/claude-output.log
      - name: Checar se houve atualizacao real
        id: check
        if: steps.guard.outputs.skip != 'true'
        run: |
          if [ -z "$(git status --porcelain -- index.html)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Alertar falha (index.html nao mudou)
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "A rotina diaria rodou em $(date -u +%FT%TZ) mas NAO produziu nenhuma mudanca em index.html."
            echo
            echo "Isso normalmente indica falha (fontes bloqueadas, erro de permissao, credito esgotado etc.),"
            echo "nao um dia sem novidade -- um painel de mercado diario quase sempre tem pelo menos"
            echo "data/precos/noticias novas. O site publicado hoje continua sendo o conteudo do dia anterior"
            echo "(fallback intencional do workflow), mas isso precisa da sua atencao."
            echo
            echo '## Saida do passo "Atualizar painel com o Claude"'
            echo '```'
            tail -c 4000 /tmp/claude-output.log 2>/dev/null || echo "(sem log capturado)"
            echo '```'
          } > /tmp/alert-body.md
          gh issue create \
            --title "Alerta: rotina diaria de $(date +%F) nao atualizou o painel" \
            --body-file /tmp/alert-body.md
      - name: Commit das mudancas
        id: commit
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "agrocore-bot"
          git config user.email "bot@agrocore.local"
          git add -A
          git commit -m "Atualizacao diaria do painel ($(date +%F))" || echo "sem mudancas"
          if git push; then
            echo "push_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Push inicial falhou (branch main avancou nesse meio-tempo) -- tentando rebase e novo push."
            if git pull --rebase origin main && git push; then
              echo "push_failed=false" >> "$GITHUB_OUTPUT"
            else
              echo "push_failed=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Alertar falha (push nao chegou no GitHub)
        if: steps.guard.outputs.skip != 'true' && steps.commit.outputs.push_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "A rotina diaria de $(date +%F) editou o index.html, mas o commit NAO chegou ao GitHub"
            echo "(git push falhou mesmo apos tentativa de rebase -- provavel push concorrente ou conflito)."
            echo
            echo "O passo de deploy ainda publica o conteudo gerado nesta execucao (a partir dos arquivos"
            echo "locais do runner), entao o site pode estar correto -- mas o repositorio ficara desatualizado"
            echo "ate alguem sincronizar manualmente o index.html publicado de volta para o git."
          } > /tmp/alert-push-body.md
          gh issue create \
            --title "Alerta: push da rotina diaria de $(date +%F) falhou (git divergente do site)" \
            --body-file /tmp/alert-push-body.md
      - name: Deploy (producao)
        if: steps.guard.outputs.skip != 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --prod --dir=. --message "Daily $(date +%F)"
